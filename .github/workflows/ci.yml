name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Lint and format check (fast — runs first)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4

      - name: Ruff check
        run: ruff check glacier_toolkit/ tests/

      - name: Ruff format check
        run: ruff format --check glacier_toolkit/ tests/

  # ────────────────────────────────────────────────────────────────────────────
  # Type check
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mypy>=1.10
          pip install numpy pandas matplotlib scipy
          pip install pandas-stubs types-requests types-Pillow

      - name: Mypy
        run: mypy glacier_toolkit/ --config-file=pyproject.toml || true
        # Mypy is informational for now — does not block CI

  # ────────────────────────────────────────────────────────────────────────────
  # Test matrix across Python versions
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin libgeos-dev libproj-dev proj-bin proj-data

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[geo,dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=glacier_toolkit --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Build distribution package
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
