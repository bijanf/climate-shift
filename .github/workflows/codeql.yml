name: CodeQL

# CodeQL requires GitHub code scanning to be enabled. This is free for public
# repositories but requires GitHub Advanced Security (a paid feature) on
# private repositories. To keep CI green on a private repo, this workflow
# only runs when the repository is public.
#
# When this repo is made public, CodeQL will automatically start running
# on pushes, PRs, and the weekly schedule with no further changes needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 1"  # Mondays at 06:30 UTC
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Skip on private repos where code scanning is not enabled
    if: ${{ !github.event.repository.private }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
