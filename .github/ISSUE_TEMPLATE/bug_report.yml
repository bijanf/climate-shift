name: Bug report
description: Report something that's broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run X, I expected Y but got Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code to reproduce the bug.
      placeholder: |
        ```bash
        python -m glacier_toolkit.pipelines.run_single_glacier --name aletsch
        ```
      render: bash
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Traceback / error output
      description: If you got an error, paste the full traceback here.
      render: pytb

  - type: input
    id: glacier
    attributes:
      label: Glacier name (if applicable)
      placeholder: e.g. "aletsch", "columbia", or custom lat/lon

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.1"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: glacier-toolkit version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
